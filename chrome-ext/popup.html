<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:380px;min-height:400px;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;background:#0a0a0f;color:#e0e0e0;font-size:.8rem;overflow-x:hidden}
h1{background:#1a1a2e;color:#ffd700;padding:10px 14px;font-size:.9rem;border-bottom:1px solid #333;display:flex;align-items:center;gap:6px}
h1 span{font-size:.6rem;color:#666;margin-left:auto}
#status{padding:6px 14px;font-size:.7rem;color:#888;background:#111;border-bottom:1px solid #222}
#status.ok{color:#4caf50}
#status.err{color:#ff6b6b}
.section{padding:8px 14px;border-bottom:1px solid #1a1a2e}
.section h2{font-size:.7rem;color:#888;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.btn{background:#1a1a2e;border:1px solid #333;color:#e0e0e0;padding:6px 8px;border-radius:6px;cursor:pointer;font-size:.72rem;text-align:center;transition:background .1s}
.btn:hover{background:#2a2a3e;border-color:#555}
.btn:active{background:#ffd700;color:#000}
.btn.wide{grid-column:1/-1}
.section .row{display:flex;gap:4px;margin-bottom:4px}
.section .row .btn{flex:1}
input,select{background:#111;border:1px solid #333;color:#e0e0e0;padding:5px 8px;border-radius:6px;font-size:.72rem;width:100%;outline:none}
input:focus{border-color:#ffd700}
#result{padding:10px 14px;background:#111;border-top:1px solid #222;font-size:.68rem;color:#888;max-height:120px;overflow-y:auto;white-space:pre-wrap;word-break:break-all}
#result .ok{color:#4caf50}
#result .err{color:#ff6b6b}
.badge{display:inline-block;background:#ffd700;color:#000;border-radius:10px;padding:1px 6px;font-size:.6rem;font-weight:bold;margin-left:4px}
</style>
</head>
<body>

<h1>🐕 Stray Dog <span>DevTools</span></h1>
<div id="status">⏳ ページを検出中...</div>

<div class="section">
  <h2>📺 画面</h2>
  <div class="btn-grid">
    <button class="btn" data-cmd="screen.hub">🏠 Hub</button>
    <button class="btn" data-cmd="screen.complete">🏆 完了</button>
    <button class="btn" data-cmd="screen.home">🏡 Home</button>
    <button class="btn" data-cmd="screen.intro">📖 Intro</button>
    <button class="btn" data-cmd="screen.map">🗺️ 地図</button>
    <button class="btn" data-cmd="screen.result">🎖️ 結果</button>
  </div>
</div>

<div class="section">
  <h2>🎮 ゲーム</h2>
  <div class="btn-grid">
    <button class="btn" data-cmd="game.puyo">🟡 ぷよ</button>
    <button class="btn" data-cmd="game.simon">🔵 シモン</button>
    <button class="btn" data-cmd="game.quiz">📝 クイズ</button>
    <button class="btn" data-cmd="game.clear">✅ クリア</button>
  </div>
</div>

<div class="section">
  <h2>🗺️ 地図</h2>
  <div class="btn-grid">
    <button class="btn" data-cmd="map.mock">📍 モックGPS</button>
    <button class="btn" data-cmd="map.open">🗺️ 開く</button>
    <button class="btn" data-cmd="map.close">✕ 閉じる</button>
    <button class="btn" data-cmd="map.pos">📍 現在地</button>
  </div>
</div>

<div class="section">
  <h2>📖 ストーリー</h2>
  <div class="row">
    <button class="btn" data-cmd="story.marathon">🎬 マラソン</button>
    <select id="scene-select">
      <option value="0">幕1: 出会い</option>
      <option value="1">幕2-1: さぼうる</option>
      <option value="2">幕2-2: 響</option>
      <option value="3">幕2-3: 神田橋公園</option>
      <option value="4">幕2-4: YON 3F</option>
      <option value="5">幕3: 再会</option>
      <option value="6">幕4: Goldberg</option>
      <option value="7">補足: 犬の言い訳</option>
    </select>
    <button class="btn" id="story-show">表示</button>
  </div>
</div>

<div class="section">
  <h2>🔮 復活の呪文</h2>
  <div class="row">
    <button class="btn" data-cmd="spell.encode">📝 生成</button>
    <input type="text" id="spell-input" placeholder="4文字ひらがな" maxlength="4" style="width:100px;text-align:center;font-size:1rem">
    <button class="btn" id="spell-decode">🔓 復元</button>
  </div>
  <button class="btn wide" data-cmd="spell.list">📋 チェックポイント一覧</button>
</div>

<div class="section">
  <h2>💾 データベース</h2>
  <div class="row">
    <button class="btn" data-cmd="db.seed">🌱 Seed読み込み</button>
    <select id="save-select">
      <option value="checkpoint-reset">🔄 リセット</option>
      <option value="checkpoint-intro">📖 イントロ</option>
      <option value="checkpoint-puzzle">🧩 パズル</option>
      <option value="checkpoint-s0">🍨 さぼうる</option>
      <option value="checkpoint-s1">🔔 響</option>
      <option value="checkpoint-s2">🗽 神田橋公園</option>
      <option value="checkpoint-complete">🎵 コンプリート</option>
    </select>
    <button class="btn" id="save-load">📂 読込</button>
  </div>
  <button class="btn wide" data-cmd="db.export">📤 エクスポート</button>
</div>

<div class="section">
  <h2>⚙️ 状態</h2>
  <div class="row">
    <button class="btn" data-cmd="state.get">📊 表示</button>
    <button class="btn" data-cmd="state.completeAll">🏅 全バッジ</button>
    <button class="btn" data-cmd="state.reset">🔄 リセット</button>
  </div>
  <div class="row">
    <button class="btn" data-cmd="util.confetti">🎊 紙吹雪</button>
    <button class="btn" data-cmd="util.share">📤 シェア</button>
    <button class="btn" data-cmd="debug.enable">🔧 Debug on</button>
  </div>
</div>

<div id="result"></div>

<script src="popup.js"></script>
</body>
</html>
