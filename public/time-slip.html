<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>タイムスリップ神保町 — yon-walk</title>
<link rel="stylesheet" href="time-slip.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
/* print qr hidden */
#print_qrs{display:none}
</style>
</head>
<body>

<!-- ====== TITLE PAGE ====== -->
<div id="title_page" class="page active">
  <div class="logo">✦ <span>タイムスリップ</span><br>神保町</div>
  <div class="subtitle">— Goldberg Variations ARG —</div>
  <div id="qrcode_box" class="qr-box"></div>
  <p style="font-size:.8rem;color:#666;margin-bottom:20px">↑ これを印刷して各地点に設置</p>
  <button class="start-btn" onclick="startStory()">▶ 物語をはじめる</button>
  <div class="version">v1.0 / yon-walk</div>
</div>

<!-- ====== INTRO STORY ====== -->
<div id="story_page" class="page">
  <div class="story-text">
    君は神保町の交差点で<br>
    一冊の古い楽譜を見つけた。<br><br>
    表紙には <span class="highlight">「Goldberg Variations」</span><br>
    裏表紙には 4 つの QR コード。<br><br>
    読み込むたびに <span class="era">時代が反転</span> する。<br><br>
    4 つの層をめぐり<br>
    <span class="trigger">肆 YON の 4 階</span> に辿り着け。<br><br>
    <span style="font-size:.8rem;color:#555">── すべての変奏は、ひとつの主題に収束する</span>
  </div>
  <button class="next-btn" onclick="goSpot(0)">▶ 第1層へ進む</button>
</div>

<!-- ====== SPOT PAGES x4 + FINALE (generated by JS) ====== -->
<div id="spot_container"></div>
<div id="finale_page" class="page"></div>

<script>
// ========== DATA ==========
const SPOTS = [
  {
    id:'spot1',order:1,
    name:'さぼうる（地下）',
    era:'1907 明治 / ウィーン',
    painting:'銀河の接吻',
    artist:'クリムト',
    goldberg:2,
    desc:'地下に降りると、金箔の輝きが闇を裂く。1907年のウィーン、クリムトが描いた接吻は、ここ神保町の地下で銀河の抱擁となった。カップの底に金粉が舞う。ゴールドベルク第2変奏——二段鍵盤が交差するように、時が折り重なる。',
    badge:'🌟 星のバッジ',
    color:'#FFD700',
    anim:'golden'
  },
  {
    id:'spot2',order:2,
    name:'一ツ橋',
    era:'1881 明治 / パリ',
    painting:'思考する巨人',
    artist:'ロダン',
    goldberg:10,
    desc:'橋の袂に立つと、1881年の学生たちの声が聞こえる。復興の街で、彼らは何を考えたのか。ロダンの巨人は、ここで静かに思索を続けている。ゴールドベルク第10変奏——フーガのように、思考が幾重にも折り重なる。',
    badge:'🧠 知恵のバッジ',
    color:'#8B4513',
    anim:'pulse'
  },
  {
    id:'spot3',order:3,
    name:'神田川沿い',
    era:'1657 江戸 / デルフト',
    painting:'星の乳を注ぐ者',
    artist:'フェルメール',
    goldberg:18,
    desc:'川の流れは1657年から変わらない。明暦の大火で燃えた街を、この水が潤した。フェルメールの青は、ここ神田川の青とつながっている。ゴールドベルク第18変奏——カノンのように、時の流れが対位法を奏でる。',
    badge:'💧 水のバッジ',
    color:'#4FC3F7',
    anim:'water'
  },
  {
    id:'spot4',order:4,
    name:'神田山 台地',
    era:'1503 戦国 / フィレンツェ',
    painting:'時の微笑み',
    artist:'ダ・ヴィンチ',
    goldberg:25,
    desc:'台地の上から見渡す景色。1503年、ここは原野だった。ダ・ヴィンチのモナ・リザは、500年の時を超えて微笑む。ゴールドベルク第25変奏——最も暗く、最も深い変奏。あなたの今も、いつか誰かの遺跡になる。',
    badge:'🕰️ 時のバッジ',
    color:'#8E24AA',
    anim:'smile'
  }
];

const FINALE = {
  name:'肆 YON 4F',
  era:'1434 室町 / ブルッヘ',
  painting:'ヤン・ファン・エイク「ホログラム夫妻」',
  goldberg:0,
  desc:'4階の小さな部屋。真空管アンプの温かい灯り。棚にはレコードが並ぶ。おじさんがゴールドベルク変奏曲をかけてくれた。アリアが再び流れ出す——最初の主題が、4つの層を経て戻ってきた。凸面鏡に映る5人目——それはあなた。ファン・エイクは1434年、ブルッヘで「私はここにいた」と記した。すべての時間は、この一室に収束する。',
  badge:'🎵 すべてのバッジ',
  color:'#B8860B'
};

// ========== STATE ==========
let collected = JSON.parse(localStorage.getItem('timeslip_collected')||'[]');
let proofState = {}; // {idx: {gps:bool, photo:bool}}
let gpsWatcher = null;

// ========== GPS LOCATION ==========
const PROXIMITY_M = 80;

function startGPS(idx){
  const statusEl = document.getElementById('gps_status_'+idx);
  if(!statusEl) return;
  statusEl.textContent = '📍 GPS位置を取得中…';
  statusEl.className = 'proof-status';

  if(gpsWatcher){
    navigator.geolocation.clearWatch(gpsWatcher);
    gpsWatcher = null;
  }

  if(!navigator.geolocation){
    statusEl.textContent = '⚠️ GPS非対応端末。QRで進行';
    statusEl.className = 'proof-status gps-ng';
    // fallback: enable camera anyway
    enableCameraBtn(idx);
    return;
  }

  gpsWatcher = navigator.geolocation.watchPosition(
    pos => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      const d = calcDist(lat,lng,SPOTS[idx].lat,SPOTS[idx].lng);
      if(d < PROXIMITY_M){
        if(!proofState[idx]) proofState[idx] = {gps:false,photo:false};
        proofState[idx].gps = true;
        statusEl.textContent = `✅ 位置確認 (${Math.round(d)}m)`;
        statusEl.className = 'proof-status gps-ok';
        // stop watching after confirmation
        navigator.geolocation.clearWatch(gpsWatcher);
        gpsWatcher = null;
        enableCameraBtn(idx);
        checkProof(idx);
      } else {
        statusEl.textContent = `📍 ${Math.round(d)}m / ${PROXIMITY_M}m以内で証明`;
        statusEl.className = 'proof-status gps-ng';
      }
    },
    err => {
      statusEl.textContent = '⚠️ GPSエラー。QRから進行可';
      statusEl.className = 'proof-status gps-ng';
      enableCameraBtn(idx);
    },
    {enableHighAccuracy:true,timeout:10000,maximumAge:5000}
  );
}

function calcDist(lat1,lng1,lat2,lng2){
  const R=6371e3;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ========== CAMERA CAPTURE ==========
function enableCameraBtn(idx){
  const btn = document.getElementById('camera_btn_'+idx);
  if(!btn) return;
  btn.disabled = false;
  btn.className = 'camera-btn active';
  btn.textContent = '📸 写真で証明';
}

function capturePhoto(idx){
  const btn = document.getElementById('camera_btn_'+idx);
  const preview = document.getElementById('photo_status_'+idx);
  const result = document.getElementById('proof_result_'+idx);
  if(!btn||btn.disabled) return;

  // use hidden video element approach
  const video = document.createElement('video');
  video.setAttribute('playsinline','');
  video.style.display = 'none';
  document.body.appendChild(video);

  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:640},height:{ideal:480}}})
    .then(stream => {
      video.srcObject = stream;
      video.play();
      setTimeout(()=>{
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video,0,0);
        const dataUrl = canvas.toDataURL('image/jpeg',0.7);
        stream.getTracks().forEach(t=>t.stop());
        video.remove();

        // store in state
        if(!proofState[idx]) proofState[idx] = {gps:false,photo:false};
        proofState[idx].photo = true;
        localStorage.setItem('timeslip_proof_'+idx, dataUrl);

        // show thumbnail
        preview.innerHTML = `<img src="${dataUrl}" alt="proof">`;
        btn.textContent = '✅ 撮影済';
        btn.className = 'camera-btn used';
        btn.disabled = true;
        if(result) result.textContent = '📸 写真証明完了';
        checkProof(idx);
      },300);
    })
    .catch(err => {
      video.remove();
      if(result) result.textContent = '⚠️ カメラ使えません。QRで進行可';
      // fallback: still allow completion
      if(!proofState[idx]) proofState[idx] = {gps:false,photo:false};
      proofState[idx].photo = true;
      checkProof(idx);
    });
}

function checkProof(idx){
  const s = proofState[idx];
  if(!s) return;
  const result = document.getElementById('proof_result_'+idx);
  if(s.gps && s.photo){
    if(result) result.textContent = '✅ 位置 + 写真 証明完了！バッジ獲得可';
    enableSpot(idx);
  }
}

function loadPhotoPreview(idx){
  const dataUrl = localStorage.getItem('timeslip_proof_'+idx);
  if(!dataUrl) return;
  const preview = document.getElementById('photo_status_'+idx);
  if(preview) preview.innerHTML = `<img src="${dataUrl}" alt="proof">`;
  const btn = document.getElementById('camera_btn_'+idx);
  if(btn){ btn.textContent='✅ 撮影済'; btn.className='camera-btn used'; btn.disabled=true; }
}

// ========== INIT ==========
function init() {
  buildSpots();
  buildFinale();
  buildQRCode();
  checkHash();
  window.addEventListener('hashchange',checkHash);
}
window.addEventListener('DOMContentLoaded',init);

function buildQRCode() {
  // generate QR for THIS page URL
  new QRCode(document.getElementById('qrcode_box'),{
    text:window.location.href.split('#')[0],
    width:160,height:160,
    colorDark:'#000',
    colorLight:'#fff',
    correctLevel:QRCode.CorrectLevel.M
  });
}

function buildSpots() {
  const container = document.getElementById('spot_container');
  SPOTS.forEach((s,i)=>{
    const div = document.createElement('div');
    div.className = 'page spot-page';
    div.id = 'spot_page_'+i;
    div.innerHTML = `
      <div class="spot-counter">${s.order} / 4</div>
      <div class="spot-era">${s.era}</div>
      <div class="spot-title" style="color:${s.color}">${s.name}</div>
      <div class="spot-painting">「${s.painting}」${s.artist}</div>
      <div id="canvas_wrap_${i}" class="canvas-wrap"><canvas id="anim_canvas_${i}"></canvas></div>
      <div id="proof_area_${i}" class="proof-area">
        <div id="gps_status_${i}" class="proof-status">📍 GPS待機…</div>
        <div class="camera-row">
          <button class="camera-btn" id="camera_btn_${i}" onclick="capturePhoto(${i})" disabled>📸 写真で証明</button>
          <div id="photo_status_${i}" class="photo-preview"></div>
        </div>
        <div id="proof_result_${i}" class="proof-result"></div>
      </div>
      <div class="spot-desc">${s.desc}</div>
      <div id="badge_area_${i}"></div>
      <button class="next-btn" id="next_btn_${i}" onclick="completeSpot(${i})" disabled>
        <span id="next_label_${i}">🔒 位置証明が必要</span>
      </button>
    `;
    container.appendChild(div);
  });
}

function buildFinale() {
  const f = document.getElementById('finale_page');
  let badgeHTML = '';
  SPOTS.forEach((s,i)=>{
    const done = collected.includes(i);
    badgeHTML += `<div class="badge-dot ${done?'collected':'empty'}">${done?s.badge.split(' ')[0]:'○'}</div>`;
  });
  f.innerHTML = `
    <div class="finale-badge">🎵</div>
    <div class="finale-title">${FINALE.name}</div>
    <div class="finale-sub">${FINALE.era}<br>「${FINALE.painting}」</div>
    <div class="badge-row">${badgeHTML}</div>
    <p style="font-size:.9rem;line-height:1.8;color:#bbb;margin-bottom:20px;padding:0 10px">${FINALE.desc}</p>
    <div id="finale_badge_area"></div>
    <button class="final-btn" onclick="resetGame()">🔄 もう一度はじめる</button>
  `;
}

// ========== NAVIGATION ==========
function showPage(id) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  const el = document.getElementById(id);
  if(el) el.classList.add('active');
  // start/stop goldberg
  if(id==='finale_page') startGoldberg();
  else stopGoldberg();
}

function startStory() {
  showPage('story_page');
}

function goSpot(idx) {
  if(idx<0||idx>=SPOTS.length) return;
  showPage('spot_page_'+idx);
  startAnimation(idx);
  startGoldberg(idx);
  // reset proof state for this spot
  if(!proofState[idx]) proofState[idx] = {gps:false,photo:false};
  // start GPS + camera flow
  startGPS(idx);
  // also check if previously visited (from hash nav)
  if(collected.includes(idx)) {
    loadPhotoPreview(idx);
    document.getElementById('next_label_'+idx).textContent = '✅ 既に証明済み';
  }
}

function enableSpot(idx) {
  const btn = document.getElementById('next_btn_'+idx);
  const lbl = document.getElementById('next_label_'+idx);
  if(!btn) return;
  btn.disabled = false;
  lbl.textContent = '▶ バッジを受け取る';
  btn.style.background = SPOTS[idx].color;
  btn.style.color = '#000';
}

function completeSpot(idx) {
  if(!collected.includes(idx)) collected.push(idx);
  localStorage.setItem('timeslip_collected',JSON.stringify(collected));
  // show badge earned
  const area = document.getElementById('badge_area_'+idx);
  if(area) area.innerHTML = `<div class="spot-badge">${SPOTS[idx].badge} 獲得！</div>`;
  // next
  const btn = document.getElementById('next_btn_'+idx);
  if(idx < SPOTS.length-1){
    btn.textContent = '▶ 次の層へ';
    btn.style.background = '#ffd700';
    btn.style.color = '#000';
    btn.onclick = ()=>goSpot(idx+1);
  } else {
    btn.textContent = '▶ YON 4F へ';
    btn.style.background = '#7c4dff';
    btn.style.color = '#fff';
    btn.onclick = ()=>goFinale();
  }
}

function goFinale() {
  showPage('finale_page');
  // rebuild finale with updated badges
  buildFinale();
  // mark completion
  if(!collected.includes('done')){
    collected.push('done');
    localStorage.setItem('timeslip_collected',JSON.stringify(collected));
  }
}

function resetGame() {
  localStorage.removeItem('timeslip_collected');
  collected = [];
  showPage('title_page');
  buildFinale();
}

// ========== HASH NAV (QR simulation) ==========
function checkHash() {
  const hash = window.location.hash.slice(1);
  if(!hash) return;
  // #spot1-#spot4
  const m = hash.match(/^spot(\d+)$/);
  if(m){
    const idx = parseInt(m[1])-1;
    if(idx>=0&&idx<SPOTS.length){
      goSpot(idx);
      // auto-collect if not yet
      if(!collected.includes(idx)){
        setTimeout(()=>completeSpot(idx),500);
      }
    }
  }
  if(hash==='finale') goFinale();
}

// ========== ANIMATIONS (Canvas) ==========
let animSessions = {};

function startAnimation(idx) {
  const s = SPOTS[idx];
  const wrap = document.getElementById('canvas_wrap_'+idx);
  if(!wrap) return;
  const canvas = document.getElementById('anim_canvas_'+idx);
  if(!canvas) return;
  // HiDPI
  const rect = wrap.getBoundingClientRect();
  const w = rect.width||320;
  const h = rect.height||240;
  canvas.width = w * 2;
  canvas.height = h * 2;
  canvas.style.width = w+'px';
  canvas.style.height = h+'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(2,2);

  let t = 0;
  let animId;

  function draw() {
    ctx.clearRect(0,0,w,h);
    switch(s.anim){
      case 'golden': drawGolden(ctx,w,h,t,s.color); break;
      case 'pulse': drawPulse(ctx,w,h,t,s.color); break;
      case 'water': drawWater(ctx,w,h,t,s.color); break;
      case 'smile': drawSmile(ctx,w,h,t,s.color); break;
      default: drawPulse(ctx,w,h,t,s.color);
    }
    t++;
    animId = requestAnimationFrame(draw);
  }
  draw();
  animSessions[idx] = ()=>cancelAnimationFrame(animId);
}

function drawGolden(ctx,w,h,t,c){
  // dark bg
  ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,w,h);
  // gold dust particles
  for(let i=0;i<30;i++){
    const x = (Math.sin(t*0.02+i*2.1)*0.5+0.5)*w;
    const y = (Math.cos(t*0.015+i*1.7)*0.5+0.5)*h;
    const r = 1+Math.sin(t*0.05+i)*0.8;
    ctx.globalAlpha = 0.3+Math.sin(t*0.03+i)*0.2;
    ctx.fillStyle = c;
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
  }
  // central glow
  const grd = ctx.createRadialGradient(w/2,h/2,0,w/2,h/2,w/3);
  grd.addColorStop(0,c+'88');grd.addColorStop(1,c+'00');
  ctx.globalAlpha=0.4+Math.sin(t*0.02)*0.2;
  ctx.fillStyle=grd;ctx.fillRect(0,0,w,h);
  ctx.globalAlpha=1;
}

function drawPulse(ctx,w,h,t,c){
  ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,w,h);
  for(let i=0;i<5;i++){
    const r = 20 + (t*1.5+i*50)%(w/2);
    const alpha = Math.max(0,0.5-(r/(w/2))*0.5);
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = c;
    ctx.lineWidth = 2;
    ctx.beginPath();ctx.arc(w/2,h/2,r,0,Math.PI*2);ctx.stroke();
  }
  ctx.globalAlpha=1;
}

function drawWater(ctx,w,h,t,c){
  ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,w,h);
  ctx.globalAlpha=0.5;
  for(let i=0;i<8;i++){
    const yOff = i*30+10;
    ctx.strokeStyle = c;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    for(let x=0;x<w;x+=3){
      const y = yOff + Math.sin((x+t*2+i)*0.02)*8;
      x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.stroke();
  }
  ctx.globalAlpha=1;
}

function drawSmile(ctx,w,h,t,c){
  ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,w,h);
  // floating smile
  const cx = w/2, cy = h/2-10;
  const r = 40+Math.sin(t*0.02)*5;
  ctx.strokeStyle = c; ctx.lineWidth = 2;
  ctx.globalAlpha = 0.5+Math.sin(t*0.03)*0.2;
  // eyes
  ctx.beginPath();ctx.arc(cx-18,cy-12,4,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.arc(cx+18,cy-12,4,0,Math.PI*2);ctx.stroke();
  // smile arc
  ctx.beginPath();ctx.arc(cx,cy+2,25,0.1,Math.PI-0.1);ctx.stroke();
  // particles
  for(let i=0;i<12;i++){
    const px = cx+Math.sin(t*0.01+i*2.6)*r;
    const py = cy+Math.cos(t*0.015+i*1.3)*r*0.6;
    ctx.fillStyle = c;ctx.globalAlpha=0.15;
    ctx.beginPath();ctx.arc(px,py,1.5,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
}

// ========== GOLDBERG AUDIO (Web Audio) ==========
let audioCtx = null;
let goldbergNodes = [];

function startGoldberg(idx){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  // stop previous
  goldbergNodes.forEach(n=>{try{n.stop()}catch(e){}});
  goldbergNodes = [];

  const spot = idx!==undefined ? SPOTS[idx] : null;
  const isFinale = idx===undefined;

  if(isFinale) document.body.classList.add('goldberg-active');
  else document.body.classList.remove('goldberg-active');

  // melody based on spot's variation or Aria
  let notes,noteDur=0.2,vol=0.2;
  if(spot){
    // different melodic phrase per spot
    const melodies = [
      [64,67,71,67,64,67,71,72], // var2
      [60,64,67,64,60,62,64,65], // var10
      [67,62,64,65,67,64,62,60], // var18
      [59,60,62,64,62,60,59,57]  // var25
    ];
    notes = melodies[spot.order-1] || [67,62,64,65,67,64,62,60];
    vol = 0.15;
  } else {
    // finale: Aria
    notes = [67,62,64,65,67,64,62,60,62,64,62,60,59,60,62,64];
    noteDur = 0.25;
    vol = 0.3;
  }

  playMelody(audioCtx,notes,noteDur,0,vol);
  if(isFinale) playMelody(audioCtx,notes,noteDur,notes.length*noteDur+0.5,vol);

  // bass drone
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'triangle';
  osc.frequency.value = spot ? 49+(spot.order*2) : 49;
  gain.gain.value = isFinale ? 0.1 : 0.05;
  osc.connect(gain);gain.connect(audioCtx.destination);
  osc.start();
  goldbergNodes.push({stop:()=>osc.stop()});
}

function stopGoldberg() {
  document.body.classList.remove('goldberg-active');
  goldbergNodes.forEach(n=>n.stop());
  goldbergNodes = [];
}

function playMelody(ctx,notes,noteDur,startOffset,vol){
  notes.forEach((note,i)=>{
    const freq = 440 * Math.pow(2,(note-69)/12);
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0,ctx.currentTime+startOffset+i*noteDur);
    gain.gain.linearRampToValueAtTime(vol,ctx.currentTime+startOffset+i*noteDur+0.02);
    gain.gain.linearRampToValueAtTime(0,ctx.currentTime+startOffset+(i+1)*noteDur-0.02);
    osc.connect(gain);gain.connect(ctx.destination);
    osc.start(ctx.currentTime+startOffset+i*noteDur);
    osc.stop(ctx.currentTime+startOffset+(i+1)*noteDur);
  });
}
