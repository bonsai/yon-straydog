<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>4×4パズル テスト</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e0e0e0;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center}
h1{color:#ffd700;font-size:1rem;margin-bottom:12px}
#grid{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;width:min(80vw,320px);height:min(80vw,320px);background:#1a1a2e;padding:3px;border-radius:10px;border:1px solid #333}
.tile{border-radius:4px;cursor:pointer;background-size:400% 400%;background-image:url(/gdog.png);filter:blur(8px);transition:filter .5s,box-shadow .12s,transform .08s}
.tile.in-place{filter:blur(0)}
.tile:active{transform:scale(.93)}
.tile.selected{box-shadow:0 0 0 3px #ffd700,0 0 14px rgba(255,215,0,.35);z-index:2}
#status{color:#555;font-size:.65rem;margin-top:8px;min-height:1.5em}
#solved{display:none;color:#ffd700;font-size:1rem;font-weight:bold;text-align:center;margin-top:8px;animation:pop .4s}
@keyframes pop{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
.back{color:#888;font-size:.75rem;margin-top:20px;text-decoration:none;border:1px solid #333;padding:6px 16px;border-radius:8px}
</style>
</head>
<body>
<h1>🐕 4×4 フォトパズル</h1>
<div id="grid"></div>
<div id="status">操作: 0 回</div>
<div id="solved">🐾<br>「さぼうる の レインボウを さがせ」</div>
<a class="back" href="../">← 戻る</a>
<script type="module">
import { createPuzzleState, isSolved, selectOrSwap } from '../src/game/puzzle.ts'

const grid = document.getElementById('grid')
const status = document.getElementById('status')
const solved = document.getElementById('solved')
if (!grid || !status || !solved) throw new Error('missing elements')
let pState = createPuzzleState(true)

function render() {
  grid.innerHTML = ''
  for (let i = 0; i < pState.tiles.length; i++) {
    const t = pState.tiles[i]
    const row = Math.floor(t.currentPos / 4)
    const col = t.currentPos % 4
    const div = document.createElement('div')
    div.className = 'tile'
    if (pState.selectedIdx !== null && pState.selectedIdx === i) div.classList.add('selected')
    if (t.currentPos === t.correctPos) div.classList.add('in-place')
    div.style.backgroundPosition = `${(col/3)*100}% ${(row/3)*100}%`
    div.addEventListener('click', () => onTap(i))
    grid.appendChild(div)
  }
  status.textContent = `操作: ${pState.moves} 回`
}

function onTap(idx: number) {
  pState = selectOrSwap(pState, idx)
  render()
  solved.style.display = 'none'
  if (pState.selectedIdx === null && isSolved(pState)) {
    status.textContent = `🎉 完成！ ${pState.moves} 回でクリア`
    grid.querySelectorAll('.tile').forEach(el => el.classList.add('in-place'))
    setTimeout(() => solved.style.display = 'block', 500)
  }
}

render()
</script>
</body>
</html>
