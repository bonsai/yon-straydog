version: 2.1

jobs:
  build-deploy:
    docker:
      - image: cimg/node:22.0

    working_directory: ~/project

    steps:
      - checkout
      - run:
          name: Install dependencies
          command: npm install
      - run:
          name: Build
          command: npm run build
      - run:
          name: Deploy to Surge
          command: npx surge dist/ straydog.surge.sh --token $SURGE_TOKEN

workflows:
  version: 2
  build-and-deploy:
    jobs:
      - build-deploy:
          filters:
            branches:
              only: main
